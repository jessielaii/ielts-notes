<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思小作文練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8; --surface:#fdfaf4; --surface2:#f0ead8;
  --border:#d4c9a8; --border2:#c2b48a;
  --text:#2c2416; --text2:#6b5c3e; --text3:#9a8566;
  --accent:#1a6b3a; --accent-light:#e8f4ed;
  --accent2:#c4520a; --accent2-light:#fef0e6;
  --accent3:#5b3ea8; --accent3-light:#ede8f8;
  --accent4:#0a6b8a; --accent4-light:#e6f4f8;
  --correct:#1a6b3a; --wrong:#c4190a;
  --shadow:0 2px 8px rgba(44,36,22,.08);
  --shadow-lg:0 4px 20px rgba(44,36,22,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

/* ── MAIN TABS ── */
.main-tabs-bar{background:var(--surface);border-bottom:2px solid var(--border2);padding:14px 18px 0;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.main-header-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:8px;}
.main-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--accent);}
.main-tabs-row{display:flex;}
.main-tab-btn{padding:9px 20px;font-family:'Noto Serif TC',serif;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;font-weight:600;}
.main-tab-btn.active{color:var(--accent);border-bottom:3px solid var(--accent);}

/* ── PAGE TOGGLE ── */
.section-page{display:none;}
.section-page.active{display:block;}

/* ══════════════════════ S1 STYLES ══════════════════════ */
.s1-sub-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;gap:0;overflow-x:auto;}
.s1-tab{padding:7px 13px;font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.s1-tab.active{color:var(--accent);border-bottom:2px solid var(--accent);font-weight:600;}
.stats-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.stat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px;}
.stat strong{color:var(--text);font-size:13px;}
.stat.c strong{color:var(--correct);}
.stat.w strong{color:var(--wrong);}
.toolbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tlabel{font-size:11px;color:var(--text3);white-space:nowrap;}
.btn{padding:4px 10px;font-size:12px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Noto Serif TC',serif;}
.btn:hover{background:var(--border);}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.pri:hover{background:#155a2f;}
.btn.danger{border-color:#e0a090;color:var(--wrong);}
.btn.danger:hover{background:#fde8e4;}
.btn.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.mdbtn{padding:4px 8px;font-size:11px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Noto Serif TC',serif;}
.mdbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.sw{position:relative;flex:1;min-width:120px;max-width:200px;}
.sw input{width:100%;padding:4px 9px 4px 24px;border:1px solid var(--border2);border-radius:4px;font-size:12px;background:var(--surface);font-family:'Noto Serif TC',serif;}
.si{position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none;}
.cat-hd{padding:11px 14px 3px;display:flex;align-items:center;gap:7px;}
.cat-name{font-family:'Fraunces',serif;font-size:15px;font-weight:700;}
.cat-ct{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:1px 7px;}
.card{margin:0 10px 6px;background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;box-shadow:var(--shadow);}
.card.ck{border-left:3px solid var(--accent);opacity:.75;}
.card-top{display:flex;padding:8px 10px;gap:8px;}
.card-cb{display:flex;align-items:flex-start;padding-top:2px;}
.card-cb input{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;}
.card-body{flex:1;display:flex;flex-direction:column;gap:5px;}
.cmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cnum{font-size:11px;color:var(--text3);font-style:italic;min-width:18px;}
.tag{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600;}
.tag-up{background:var(--accent-light);color:var(--accent);}
.tag-dn{background:var(--accent2-light);color:var(--accent2);}
.tag-st{background:var(--accent3-light);color:var(--accent3);}
.tag-wv{background:var(--accent4-light);color:var(--accent4);}
.tag-cp{background:#f8e6f4;color:#8a3a6b;}
.tag-ti{background:#f0f4e6;color:#5a7a1a;}
.tag-no{background:#f4f0e0;color:#7a5a1a;}
.tag-cn{background:#e6eff8;color:#3a5a7a;}
.tag-ln{background:#e8eef8;color:#2a4a7a;}
.tag-pr{background:#fef3e0;color:#7a5000;}
.tag-br{background:#e8f4ec;color:#1a6b3a;}
.scn{font-size:13.5px;color:var(--text);line-height:1.6;font-weight:600;}
.sen{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--accent);line-height:1.5;font-style:italic;}
.inpwrap{display:flex;gap:5px;align-items:flex-start;}
.ainp{flex:1;padding:6px 8px;border:1.5px solid var(--border2);border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;background:var(--bg);color:var(--text);resize:none;min-height:32px;transition:border-color .15s;line-height:1.5;}
.ainp:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.ainp.cbg{border-color:var(--correct);background:#edfaf3;color:var(--correct);}
.ainp.wbg{border-color:var(--wrong);background:#fef2f1;color:var(--wrong);}
.rbadge{font-size:13px;padding-top:6px;flex-shrink:0;}
.reveal{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--correct);font-style:italic;padding:3px 7px;background:var(--accent-light);border-radius:4px;border-left:2px solid var(--accent);margin-top:2px;display:none;}
.reveal.show{display:block;}
.note-area{border-top:1px dashed var(--border);padding:5px 10px 8px;display:none;}
.note-area.open{display:block;}
.note-inp{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Serif TC',serif;font-size:12px;background:#fffdf7;resize:none;min-height:38px;color:var(--text2);}
.note-inp:focus{outline:none;border-color:var(--accent3);}
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:14px;}
.pbar{height:3px;background:var(--border);}
.pbfill{height:100%;background:var(--accent);transition:width .3s;width:0%;}

/* ══════════════════════ S2 STYLES ══════════════════════ */
.s2-stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.s2-pbar{height:3px;background:var(--border);}
.s2-pfill{height:100%;background:var(--accent4);transition:width .3s;width:0%;}
.s2-toolbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.s2-fbtn{padding:3px 9px;font-size:11px;border-radius:3px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:'Noto Serif TC',serif;transition:all .15s;}
.s2-fbtn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.s2-wrap{max-width:760px;margin:0 auto;padding:14px 10px;}
.s2-intro{background:linear-gradient(135deg,#f0f8f3 0%,#e8f0fb 100%);border:1px solid #c0d8c8;border-radius:9px;padding:12px 16px;margin-bottom:14px;}
.s2-intro h3{font-family:'Fraunces',serif;font-size:15px;color:var(--accent);margin-bottom:3px;}
.s2-intro p{font-size:12px;color:var(--text2);line-height:1.6;}
.exblock{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
.exhd{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.exbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
.bv{background:#e8f4ed;color:#1a6b3a;}
.br{background:#fef0e6;color:#c4520a;}
.bg{background:#ede8f8;color:#5b3ea8;}
.bt{background:#e6f4f8;color:#0a6b8a;}
.bp{background:#f8e6f4;color:#8a3a6b;}
.extitle{font-size:13px;font-weight:700;color:var(--text);}
.exsub{font-size:11px;color:var(--text3);margin-left:auto;font-style:italic;}
.exbody{padding:11px 13px;display:flex;flex-direction:column;gap:9px;}
.tipbox{background:#fffdf0;border:1px solid #e6d88a;border-radius:6px;padding:7px 11px;font-size:12px;color:#6b5a00;line-height:1.6;}
.tipbox strong{color:#4a3d00;}
.qi{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.qi-top{padding:8px 10px;background:var(--bg);}
.qprompt{font-size:13px;color:var(--text);line-height:1.7;}
.qprompt .hl{font-family:'DM Mono',monospace;font-size:12px;background:#fff3cd;border:1px solid #ffe08a;border-radius:3px;padding:1px 4px;color:#7a5200;}
.qi-inp{padding:6px 10px 9px;background:var(--surface);}
.qinp{width:100%;padding:7px 9px;border:1.5px solid var(--border2);border-radius:5px;font-family:'DM Mono',monospace;font-size:12.5px;background:var(--bg);color:var(--text);resize:none;min-height:36px;transition:border-color .15s;line-height:1.6;}
.qinp:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.qinp.cbg{border-color:var(--correct);background:#edfaf3;color:var(--correct);}
.qinp.wbg{border-color:var(--wrong);background:#fef2f1;color:var(--wrong);}
.qfb{display:none;padding:6px 10px;border-top:1px dashed var(--border);font-size:12px;line-height:1.6;}
.qfb.show{display:block;}
.qfb.okfb{background:#edfaf3;color:var(--correct);}
.qfb.nofb{background:#fef2f1;}
.fba{font-family:'DM Mono',monospace;color:var(--accent);font-style:italic;}
</style>
</head>
<body>

<!-- ══ MAIN TAB BAR ══ -->
<div class="main-tabs-bar">
  <div class="main-header-row">
    <div class="main-title">📊 雅思小作文練習</div>
  </div>
  <div class="main-tabs-row">
    <button class="main-tab-btn active" onclick="switchMain('s1')">✍️ 表達句型練習</button>
    <button class="main-tab-btn" onclick="switchMain('s2')">💡 寫作反饋練習</button>
    <button class="main-tab-btn" onclick="switchMain('s3')">📊 圖表詞組</button>
  </div>
</div>

<!-- ══ SECTION 1 ══ -->
<div id="main-s1" class="section-page active">
  <div class="s1-sub-bar" id="s1tabs"></div>
  <div class="stats-bar">
    <span class="stat">已完成 <strong id="s1d">0</strong>/<strong id="s1t">0</strong></span>
    <span class="stat c">✓ 正確 <strong id="s1c">0</strong></span>
    <span class="stat w">✗ 錯誤 <strong id="s1w">0</strong></span>
  </div>
  <div class="pbar"><div class="pbfill" id="s1pb"></div></div>
  <div class="toolbar">
    <div class="sw"><span class="si">🔍</span><input type="text" id="s1q" placeholder="搜尋..."></div>
    <button class="btn pri" onclick="s1Grade()">✓ 批改</button>
    <button class="btn danger" onclick="s1Clear()">清除</button>
    <button class="btn" onclick="s1ResetCk()">重置勾選</button>
    <button class="btn" id="s1nt" onclick="s1ToggleNote()">📌 筆記</button>
    <span class="tlabel">模式：</span>
    <button class="mdbtn active" data-m="read" onclick="s1SetMode('read')">📖 閱讀</button>
    <button class="mdbtn" data-m="cn2en" onclick="s1SetMode('cn2en')">👁 看中文填英文</button>
    <button class="mdbtn" data-m="en2cn" onclick="s1SetMode('en2cn')">👁 看英文填中文</button>
    <button class="mdbtn" data-m="fill" onclick="s1SetMode('fill')">✏️ 全填</button>
    <span class="tlabel">篩選：</span>
    <button class="btn on" data-f="all" onclick="s1SetF(this,'all')">全部</button>
    <button class="btn" data-f="checked" onclick="s1SetF(this,'checked')">已勾選</button>
    <button class="btn" data-f="unchecked" onclick="s1SetF(this,'unchecked')">未勾選</button>
  </div>
  <div id="s1ct"></div>
</div>

<!-- ══ SECTION 2 ══ -->
<div id="main-s2" class="section-page">
  <div class="s2-stats-bar">
    <span class="stat">題目 <strong id="s2t">0</strong></span>
    <span class="stat c">✓ 答對 <strong id="s2c">0</strong></span>
    <span class="stat w">✗ 答錯 <strong id="s2w">0</strong></span>
  </div>
  <div class="s2-pbar"><div class="s2-pfill" id="s2pb"></div></div>
  <div class="s2-toolbar">
    <button class="btn pri" onclick="s2Grade()">✓ 全部批改</button>
    <button class="btn danger" onclick="s2Clear()">清除</button>
    <span class="tlabel" style="margin-left:4px;">篩選：</span>
    <button class="s2-fbtn active" data-f="all" onclick="s2SetF(this,'all')">全部</button>
    <button class="s2-fbtn" data-f="vocab" onclick="s2SetF(this,'vocab')">📚 詞彙</button>
    <button class="s2-fbtn" data-f="paraphrase" onclick="s2SetF(this,'paraphrase')">🔄 同義替換</button>
    <button class="s2-fbtn" data-f="grammar" onclick="s2SetF(this,'grammar')">📐 語法結構</button>
    <button class="s2-fbtn" data-f="transform" onclick="s2SetF(this,'transform')">⇌ 句型轉換</button>
    <button class="s2-fbtn" data-f="rewrite" onclick="s2SetF(this,'rewrite')">✏️ 句子改寫</button>
  </div>
  <div class="s2-wrap" id="s2ct"></div>
</div>

<!-- ══ SECTION 3 ══ -->
<div id="main-s3" class="section-page">
  <div class="s1-sub-bar" id="s3tabs"></div>
  <div class="stats-bar">
    <span class="stat">已完成 <strong id="s3d">0</strong>/<strong id="s3t">0</strong></span>
    <span class="stat c">✓ 正確 <strong id="s3c">0</strong></span>
    <span class="stat w">✗ 錯誤 <strong id="s3w">0</strong></span>
  </div>
  <div class="pbar"><div class="pbfill" id="s3pb"></div></div>
  <div class="toolbar">
    <div class="sw"><span class="si">🔍</span><input type="text" id="s3q" placeholder="搜尋..."></div>
    <button class="btn pri" onclick="s3Grade()">✓ 批改</button>
    <button class="btn danger" onclick="s3Clear()">清除</button>
    <button class="btn" onclick="s3ResetCk()">重置勾選</button>
    <button class="btn" id="s3nt" onclick="s3ToggleNote()">📌 筆記</button>
    <span class="tlabel">模式：</span>
    <span id="s3md">
      <button class="mdbtn active" data-m="read" onclick="s3SetMode('read')">📖 閱讀</button>
      <button class="mdbtn" data-m="cn2en" onclick="s3SetMode('cn2en')">👁 看中文填英文</button>
      <button class="mdbtn" data-m="en2cn" onclick="s3SetMode('en2cn')">👁 看英文填中文</button>
      <button class="mdbtn" data-m="fill" onclick="s3SetMode('fill')">✏️ 全填</button>
    </span>
    <span class="tlabel">篩選：</span>
    <span id="s3fl">
      <button class="btn on" data-f="all" onclick="s3SetF(this,'all')">全部</button>
      <button class="btn" data-f="checked" onclick="s3SetF(this,'checked')">已勾選</button>
      <button class="btn" data-f="unchecked" onclick="s3SetF(this,'unchecked')">未勾選</button>
    </span>
  </div>
  <div id="s3ct"></div>
</div>

<script>
// ═══════════ SHARED ═══════════
function norm(s){return String(s).toLowerCase().replace(/[^\w\u4e00-\u9fff]/g,'').trim();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function switchMain(id){
  ['s1','s2','s3'].forEach(k=>{
    document.getElementById('main-'+k).classList.toggle('active',k===id);
  });
  document.querySelectorAll('.main-tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&id==='s1')||(i===1&&id==='s2')||(i===2&&id==='s3'));
  });
}

// SECTION 1 DATA
// ═══════════════════════════════════════════════

  {id:12,cat:'down',cl:'下降類動詞',sub:'名詞在句首',cn:'下降了約3%（decline做主語）',en:'The decline was dramatic in this country (about 3%).',t:['tag-dn']},

const S1_TABS=[
  {k:'all',l:'全部'},{k:'up',l:'↑ 上升'},{k:'down',l:'↓ 下降'},
  {k:'stable',l:'— 平穩'},{k:'wave',l:'〜 波動'},{k:'compare',l:'⇌ 比較'},
  {k:'time',l:'⏱ 時間'},{k:'noun',l:'📋 名詞'},{k:'connector',l:'🔗 連接詞'},
];
const TAGLABEL={'tag-up':'↑ 上升','tag-dn':'↓ 下降','tag-st':'— 平穩','tag-wv':'〜 波動','tag-cp':'⇌ 比較','tag-ti':'⏱ 時間','tag-no':'📋 名詞','tag-cn':'🔗 連接詞','tag-ln':'📈 折線圖','tag-pr':'🔄 流程圖','tag-br':'📊 長條圖'};

let s1m='read',s1f='all',s1tab='all',s1note=false,s1g={};
const s1ck=new Set(JSON.parse(localStorage.getItem('s1ck')||'[]'));
const s1no=JSON.parse(localStorage.getItem('s1no')||'{}');

function s1Init(){
  document.getElementById('s1tabs').innerHTML=S1_TABS.map(t=>`<button class="s1-tab${t.k==='all'?' active':''}" onclick="s1SetTab('${t.k}',this)">${t.l}</button>`).join('');
  document.getElementById('s1q').addEventListener('input',s1Render);
  s1Render();
}
function s1SetTab(k,b){s1tab=k;s1g={};document.querySelectorAll('.s1-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');s1Render();}
function s1Vis(){
  const q=document.getElementById('s1q').value.trim().toLowerCase();
  return D1.filter(d=>{
    if(d.cat==='chart')return false;
    if(s1tab!=='all'&&d.cat!==s1tab)return false;
    if(s1f==='checked'&&!s1ck.has(d.id))return false;
    if(s1f==='unchecked'&&s1ck.has(d.id))return false;
    if(q&&!d.cn.toLowerCase().includes(q)&&!d.en.toLowerCase().includes(q)&&!d.sub.toLowerCase().includes(q))return false;
    return true;
  });
}
function s1Render(){
  const items=s1Vis();const el=document.getElementById('s1ct');
  if(!items.length){el.innerHTML='<div class="empty">沒有符合條件的句子 🔍</div>';s1Stat();return;}
  const g={};items.forEach(d=>{if(!g[d.cl])g[d.cl]=[];g[d.cl].push(d);});
  let h='';
  for(const[cl,list]of Object.entries(g)){
    h+=`<div class="cat-hd"><span class="cat-name">${cl}</span><span class="cat-ct">${list.length}項</span></div>`;
    list.forEach(d=>{h+=s1Card(d);});
  }
  el.innerHTML=h;
  items.forEach(d=>{
    document.getElementById(`s1cb${d.id}`)?.addEventListener('change',e=>{
      if(e.target.checked)s1ck.add(d.id);else s1ck.delete(d.id);
      localStorage.setItem('s1ck',JSON.stringify([...s1ck]));
      document.getElementById(`s1cd${d.id}`)?.classList.toggle('ck',e.target.checked);
    });
    const ni=document.getElementById(`s1ni${d.id}`);
    if(ni)ni.addEventListener('input',()=>{s1no[d.id]=ni.value;localStorage.setItem('s1no',JSON.stringify(s1no));});
  });
  s1Stat();
}
function s1Card(d){
  const ck=s1ck.has(d.id),gv=s1g[d.id];
  const scn=s1m==='read'||s1m==='cn2en'||s1m==='fill';
  const sen=s1m==='read';
  const ien=s1m==='cn2en'||s1m==='fill';
  const icn=s1m==='en2cn'||s1m==='fill';
  let b='';
  if(scn)b+=`<div class="scn">${esc(d.cn)}</div>`;
  if(icn){const c=gv===true?'cbg':gv===false?'wbg':'';
    b+=`<div class="inpwrap"><textarea class="ainp ${c}" id="s1icn${d.id}" rows="2" placeholder="中文..."></textarea>${gv!==undefined?`<span class="rbadge">${gv?'✅':'❌'}</span>`:''}</div>`;
    if(gv===false)b+=`<div class="reveal show">✦ ${esc(d.cn)}</div>`;}
  if(sen)b+=`<div class="sen">${esc(d.en)}</div>`;
  if(ien){const c=gv===true?'cbg':gv===false?'wbg':'';
    b+=`<div class="inpwrap"><textarea class="ainp ${c}" id="s1ien${d.id}" rows="2" placeholder="英文..."></textarea>${gv!==undefined?`<span class="rbadge">${gv?'✅':'❌'}</span>`:''}</div>`;
    if(gv===false)b+=`<div class="reveal show">✦ ${esc(d.en)}</div>`;}

let s2f='all',s2ans={},s2g={};

function s2Stat(){
  const bl=s2Blocks();let t=0,c=0,w=0;

      s2g[q.id]=q.acc.some(a=>u.includes(norm(a)));
      s2ans[q.id]=i.value;
    }
  }));
  s2Render();
}

const S3_TABS=[
  {k:'all',l:'全部'},{k:'line',l:'📈 折線圖'},{k:'process',l:'🔄 流程圖'},{k:'bar',l:'📊 長條圖'},
];
function s3ChartType(d){
  if(d.cl.startsWith('折線圖'))return 'line';
  if(d.cl.startsWith('流程圖'))return 'process';
  if(d.cl.startsWith('長條圖'))return 'bar';
  return 'other';
}
let s3m='read',s3tab='all',s3note=false,s3g={},s3f='all';
function s3Init(){
  document.getElementById('s3tabs').innerHTML=S3_TABS.map(t=>`<button class="s1-tab${t.k==='all'?' active':''}" onclick="s3SetTab('${t.k}',this)">${t.l}</button>`).join('');
  document.getElementById('s3q').addEventListener('input',s3Render);
  s3Render();
}
function s3SetTab(k,b){
  s3tab=k;s3g={};
  document.querySelectorAll('#s3tabs .s1-tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');s3Render();
}
function s3Vis(){
  const q=document.getElementById('s3q').value.trim().toLowerCase();
  return D1.filter(d=>{
    if(d.cat!=='chart')return false;
    if(s3tab!=='all'&&s3ChartType(d)!==s3tab)return false;
    if(s3f==='checked'&&!s1ck.has(d.id))return false;
    if(s3f==='unchecked'&&s1ck.has(d.id))return false;
    if(q&&!d.cn.toLowerCase().includes(q)&&!d.en.toLowerCase().includes(q)&&!d.sub.toLowerCase().includes(q))return false;
    return true;
  });
}
function s3Render(){
  const items=s3Vis();const el=document.getElementById('s3ct');
  if(!items.length){el.innerHTML='<div class="empty">沒有符合條件的句子 🔍</div>';s3Stat();return;}
  const g={};items.forEach(d=>{if(!g[d.cl])g[d.cl]=[];g[d.cl].push(d);});
  let h='';
  for(const[cl,list]of Object.entries(g)){
    h+=`<div class="cat-hd"><span class="cat-name">${cl}</span><span class="cat-ct">${list.length}項</span></div>`;
    list.forEach(d=>{h+=s3Card(d);});
  }
  el.innerHTML=h;
  items.forEach(d=>{
    document.getElementById(`s3cb${d.id}`)?.addEventListener('change',e=>{
      if(e.target.checked)s1ck.add(d.id);else s1ck.delete(d.id);
      localStorage.setItem('s1ck',JSON.stringify([...s1ck]));
      document.getElementById(`s3cd${d.id}`)?.classList.toggle('ck',e.target.checked);
    });
    const ni=document.getElementById(`s3ni${d.id}`);
    if(ni)ni.addEventListener('input',()=>{s1no[d.id]=ni.value;localStorage.setItem('s1no',JSON.stringify(s1no));});
  });
  s3Stat();
}

    </div>
    <div class="note-area${s3note?' open':''}"><textarea class="note-inp" id="s3ni${d.id}" placeholder="✏️ 筆記...">${esc(s1no[d.id]||'')}</textarea></div>
  </div>`;
}
function s3Stat(){
  const v=s3Vis();document.getElementById('s3t').textContent=v.length;

  document.getElementById('s3c').textContent=v.filter(d=>s3g[d.id]===true).length;
  document.getElementById('s3w').textContent=v.filter(d=>s3g[d.id]===false).length;
  document.getElementById('s3pb').style.width=(v.length?(done/v.length*100):0)+'%';
}

    if(s3m==='cn2en'||s3m==='fill'){const e=document.getElementById(`s3ien${d.id}`);if(e&&e.value.trim())s3g[d.id]=norm(e.value)===norm(d.en);}
    if(s3m==='en2cn'||s3m==='fill'){const e=document.getElementById(`s3icn${d.id}`);if(e&&e.value.trim())s3g[d.id]=norm(e.value)===norm(d.cn);}
  });s3Render();

function s3Clear(){s3g={};s3Render();}
function s3ResetCk(){s1ck.clear();localStorage.setItem('s1ck','[]');s3Render();}
function s3ToggleNote(){s3note=!s3note;document.getElementById('s3nt').classList.toggle('on',s3note);s3Render();}
function s3SetMode(m){
  s3m=m;s3g={};
  document.querySelectorAll('#s3md .mdbtn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  s3Render();
}
function s3SetF(btn,f){
